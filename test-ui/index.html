<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuthService UI Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="brand-tag">Test UI</p>
        <h1>AuthService</h1>
        <p class="brand-sub">Flujo de pantallas + pruebas de API</p>
      </div>

      <nav class="menu">
        <p class="menu-title">Pantallas publicas</p>
        <button class="menu-link" data-route="login">Login</button>
        <button class="menu-link" data-route="register">Registro</button>
        <button class="menu-link" data-route="google">Login Google</button>
        <button class="menu-link" data-route="forgot">Olvide clave</button>
        <button class="menu-link" data-route="reset">Reset clave</button>
        <button class="menu-link" data-route="verify">Verificar email</button>
        <button class="menu-link" data-route="resend">Reenviar verificacion</button>
        <button class="menu-link" data-route="health">Health</button>
      </nav>

      <nav class="menu">
        <p class="menu-title">Panel autenticado</p>
        <button class="menu-link menu-private" data-route="app/home">Inicio</button>
        <button class="menu-link menu-private" data-route="app/me">Mi perfil</button>
        <button class="menu-link menu-private" data-route="app/sessions">Sesiones</button>
        <button class="menu-link menu-private" data-route="app/security">Seguridad</button>
        <button class="menu-link menu-private" data-route="app/tokens">Tokens y logout</button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="route-title">Login</h2>
          <p id="route-subtitle">Pantalla activa</p>
        </div>

        <div class="topbar-right">
          <label class="topbar-label" for="api-base-url">API Base URL</label>
          <div class="url-row">
            <input id="api-base-url" type="text" value="http://localhost:5091" />
            <button id="save-config-btn" class="btn btn-soft">Guardar</button>
          </div>
          <div class="status-row">
            <span id="auth-pill" class="pill pill-muted">Sin sesion</span>
            <span id="user-pill" class="pill pill-muted">Usuario: -</span>
            <button id="clear-session-btn" class="btn btn-danger">Limpiar sesion</button>
          </div>
        </div>
      </header>

      <div id="flash" class="flash hidden"></div>

      <main id="view" class="view"></main>
    </section>

    <aside class="console">
      <div class="console-head">
        <h3>Consola HTTP</h3>
        <div class="console-actions">
          <button id="copy-console-btn" class="btn btn-soft">Copiar</button>
          <button id="clear-console-btn" class="btn btn-soft">Limpiar</button>
        </div>
      </div>

      <div id="http-meta" class="console-meta">Sin llamadas aun</div>
      <pre id="http-body" class="console-body">Ejecuta un formulario y aqui veras la respuesta JSON.</pre>
    </aside>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
